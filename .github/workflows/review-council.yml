# Review Council — automated code review for every PR
#
# This workflow can be copied into any Scholete repo. It checks out
# the review-council code, installs minimal deps, and runs the
# 3-stage council against the PR diff.
#
# Setup per repo (Settings → Secrets and variables → Actions):
#   - NEURALWATT_API_KEY
#   - DEEPSEEK_API_KEY
#   - GITHUB_TOKEN is auto-provided

name: Review Council

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Explicit token scopes — GITHUB_TOKEN is read-only by default otherwise
permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Check out the PR code (for context, though the diff comes via API)
      - uses: actions/checkout@v4

      # Check out the review-council code (the engine)
      - uses: actions/checkout@v4
        with:
          repository: scholete/review-council
          ref: master
          path: review-council

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run Review Council
        working-directory: ./review-council
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEURALWATT_API_KEY: ${{ secrets.NEURALWATT_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python review.py
